name: Daily Repository Status Update

on:
  schedule:
    - cron: '0 0 * * *' # Every day at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-status:
    name: Generate and Commit Repo Status
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Status Generator
        run: node scripts/generate-repo-status.mjs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .agent/state/repo-status.md .agent/state/repo-status.json
          git diff-index --quiet HEAD || git commit -m "chore(agent): update repo status [skip ci]"
          git push
